<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dott. Marco Ugolotti - Studio di Fisioterapia a Genova. Sito web in arrivo.">
    <title>Dott. Marco Ugolotti - Sito in Arrivo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f7f9fb 0%, #e8ecf1 100%);
            color: #2c3e50;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .doctor-name {
            font-size: 1.5rem;
            font-weight: 300;
            color: #2c5f7d;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeIn 1s ease-in forwards;
            letter-spacing: 0.5px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-container {
            margin-bottom: 2rem;
            animation: float 3s ease-in-out infinite;
        }

        .medical-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            position: relative;
            animation: pulse 2s ease-in-out infinite;
        }

        .medical-icon::before,
        .medical-icon::after {
            content: '';
            position: absolute;
            background: #4a90b5;
            border-radius: 4px;
        }

        .medical-icon::before {
            width: 60px;
            height: 12px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .medical-icon::after {
            width: 12px;
            height: 60px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.7;
                transform: scale(1.05);
            }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .headline {
            display: inline-block;
            position: relative;
        }

        .loading-dots {
            display: inline-block;
            width: 50px;
            text-align: left;
        }

        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% {
                content: '';
            }
            40% {
                content: '.';
            }
            60% {
                content: '..';
            }
            80%, 100% {
                content: '...';
            }
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 400;
            color: #5a6c7d;
            margin-bottom: 2rem;
            line-height: 1.7;
            opacity: 0;
            animation: fadeIn 1s ease-in 0.3s forwards;
        }

        .contact-info {
            font-size: 1rem;
            color: #7a8c9e;
            margin-top: 3rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            opacity: 0;
            animation: fadeIn 1s ease-in 0.6s forwards;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            text-align: center;
            font-size: 0.875rem;
            color: #7a8c9e;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Decorative circles */
        .circle {
            position: fixed;
            border-radius: 50%;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }

        .circle1 {
            width: 300px;
            height: 300px;
            background: #4a90b5;
            top: -100px;
            right: -100px;
            animation: float 8s ease-in-out infinite;
        }

        .circle2 {
            width: 200px;
            height: 200px;
            background: #2c5f7d;
            bottom: -50px;
            left: -50px;
            animation: float 6s ease-in-out infinite reverse;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .doctor-name {
                font-size: 1.2rem;
                margin-bottom: 2rem;
            }

            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1.1rem;
            }

            .medical-icon {
                width: 60px;
                height: 60px;
            }

            .medical-icon::before {
                width: 45px;
                height: 10px;
            }

            .medical-icon::after {
                width: 10px;
                height: 45px;
            }

            .contact-info {
                font-size: 0.95rem;
                padding: 1.2rem;
            }

            footer {
                font-size: 0.8rem;
                padding: 1rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1.5rem;
            }

            .doctor-name {
                font-size: 1.1rem;
            }

            h1 {
                font-size: 1.75rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .loading-dots {
                width: 40px;
            }
        }
    </style>
</head>
<body>
    <!-- Decorative background elements -->
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>

    <div class="container">
        <div class="doctor-name">Dott. Marco Ugolotti, JSCC</div>
        
        <div class="icon-container">
            <div class="medical-icon"></div>
        </div>

        <h1>
            <span class="headline">Sito web in arrivo</span><span class="loading-dots"></span>
        </h1>

        <p class="subtitle">
            Il nuovo sito dello studio di fisioterapia sarà presto online.
        </p>

        <div class="contact-info">
            Per informazioni o appuntamenti è possibile contattare lo studio.
        </div>
    </div>

    <footer>
        &copy; 2026 Studio di Fisioterapia &ndash; Genova
    </footer>
</body>
</html>
